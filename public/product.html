<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi Tiết Sản Phẩm - NeoGear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav nav-page">
    <div class="logo">NEOGEAR</div>
    <ul>
      <li><a href="/">Trang chủ</a></li>
      <li><a href="/products.html" style="color: var(--accent);">Sản phẩm</a></li>
      <li><a href="/cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a></li>
      <li><a href="/login.html" style="color: var(--accent); border: 1px solid var(--accent-soft); padding: 0.4rem 1rem; border-radius: 20px; transition: all 0.3s;">Đăng nhập</a></li>
    </ul>
  </nav>

  <main style="padding: 4rem 4vw; min-height: 80vh; max-width: 1000px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent-soft); padding-bottom: 1rem; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
      <div>
        <h2 style="font-size: 2rem; color: var(--accent); margin: 0;">Chi tiết sản phẩm</h2>
        <p style="color: var(--muted); margin: 0.8rem 0 0; max-width: 720px;">Xem thông tin chi tiết, giá và tồn kho. Nhấn nút để thêm sản phẩm vào giỏ hàng.</p>
      </div>
      <a href="/products.html" class="btn btn--ghost" style="white-space: nowrap;">Quay về sản phẩm</a>
    </div>

    <div id="product-detail-root">
      <div style="text-align: center; color: var(--muted); padding: 4rem 0;">Đang tải chi tiết sản phẩm...</div>
    </div>
  </main>

  <footer style="padding: 2rem; text-align: center; border-top: 1px solid var(--accent-soft); color: var(--muted); background: var(--bg-1);">
    &copy; 2026 NeoGear. All rights reserved.
  </footer>

  <script src="script.js"></script>
</body>
</html>
