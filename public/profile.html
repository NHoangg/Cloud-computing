<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Thông tin Khách hàng - NeoGear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .nav-page {
        padding: 1.2rem 4vw;
        background: var(--bg-1);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }
      .profile-grid {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 2rem;
        margin-top: 2rem;
      }
      .sidebar {
        background: var(--bg-1);
        border: 1px solid var(--accent-soft);
        border-radius: 12px;
        padding: 2rem;
        height: fit-content;
      }
      .sidebar-item {
        display: block;
        padding: 1rem;
        color: var(--text);
        text-decoration: none;
        border-radius: 8px;
        margin-bottom: 0.5rem;
        transition: 0.3s;
      }
      .sidebar-item:hover, .sidebar-item.active {
        background: rgba(61, 217, 255, 0.1);
        color: var(--accent);
      }
      .profile-content {
        background: var(--bg-1);
        border: 1px solid var(--accent-soft);
        border-radius: 12px;
        padding: 2rem;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--muted);
      }
      .form-group input {
        width: 100%;
        padding: 0.9rem;
        border: 1px solid var(--accent-soft);
        background: rgba(0,0,0,0.3);
        color: var(--text);
        border-radius: 8px;
        font-family: inherit;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent);
      }
      @media (max-width: 768px) {
        .profile-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav nav-page">
      <a href="/" class="logo" style="color: inherit; text-decoration: none;">NEOGEAR</a>
      <ul>
        <li><a href="/">Trang chủ</a></li>
        <li><a href="/products.html">Sản phẩm</a></li>
        <li><a href="/cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a></li>
        <li><a href="/login.html" style="color: var(--accent); border: 1px solid var(--accent-soft); padding: 0.4rem 1rem; border-radius: 20px; transition: all 0.3s;">Đăng nhập</a></li>
      </ul>
    </nav>

    <main style="padding: 2rem 4vw; min-height: 80vh; max-width: 1200px; margin: 0 auto;">
      <h2 style="font-size: 2rem; color: var(--text); border-bottom: 1px solid var(--accent-soft); padding-bottom: 1rem; margin-bottom: 0;">Tài khoản của tôi</h2>
      
      <div class="profile-grid">
        <aside class="sidebar">
          <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 80px; height: 80px; background: var(--bg-2); border: 2px solid var(--accent); border-radius: 50%; margin: 0 auto 1rem auto; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--accent); font-weight: bold;" id="avatar-text">U</div>
            <h3 style="margin: 0;" id="sidebar-name">User Name</h3>
            <p style="color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem;" id="sidebar-email">user@email.com</p>
          </div>
          <a href="#" class="sidebar-item active">Hồ sơ cá nhân</a>
          <a href="#" class="sidebar-item">Đơn hàng của tôi</a>
          <a href="#" class="sidebar-item">Sản phẩm yêu thích</a>
          <a href="#" class="sidebar-item" style="color: #ff4757;" onclick="logout(event)">Đăng xuất</a>
        </aside>

        <section class="profile-content">
          <h3 style="margin-top: 0; color: var(--accent); margin-bottom: 1.5rem;">Quản lý thông tin hồ sơ để bảo mật tài khoản</h3>
          
          <form id="profile-form">
            <div class="form-group">
              <label>Họ và tên</label>
              <input type="text" id="profile-fullname" required />
            </div>
            <div class="form-group">
              <label>Email (Tài khoản đăng nhập)</label>
              <input type="email" id="profile-email" readonly style="opacity: 0.7; cursor: not-allowed;" />
            </div>
            <div class="form-group">
              <label>Số điện thoại</label>
              <input type="tel" id="profile-phone" placeholder="Thêm số điện thoại" />
            </div>
            <div class="form-group">
              <label>Địa chỉ nhận hàng mặc định</label>
              <input type="text" id="profile-address" placeholder="Thêm địa chỉ giao hàng" />
            </div>
            <button type="submit" class="btn btn--primary" style="padding: 0.8rem 2.5rem; font-size: 1rem; cursor: pointer;">Lưu Thay Đổi</button>
          </form>
        </section>
      </div>
    </main>

    <footer style="padding: 2rem; text-align: center; border-top: 1px solid var(--accent-soft); color: var(--muted); background: var(--bg-1);">
      &copy; 2026 NeoGear. All rights reserved.
    </footer>

    <script src="script.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
          alert('Vui lòng đăng nhập để xem thông tin!');
          window.location.href = '/login.html';
          return;
        }

        // Điền dữ liệu vào form và sidebar
        document.getElementById('sidebar-name').innerText = currentUser.fullname;
        document.getElementById('sidebar-email').innerText = currentUser.email;
        document.getElementById('avatar-text').innerText = currentUser.fullname.charAt(0).toUpperCase();

        document.getElementById('profile-fullname').value = currentUser.fullname;
        document.getElementById('profile-email').value = currentUser.email;
        if(currentUser.phone) document.getElementById('profile-phone').value = currentUser.phone;
        if(currentUser.address) document.getElementById('profile-address').value = currentUser.address;
      });

      document.getElementById('profile-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        currentUser.fullname = document.getElementById('profile-fullname').value;
        currentUser.phone = document.getElementById('profile-phone').value;
        currentUser.address = document.getElementById('profile-address').value;
        
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        
        document.getElementById('sidebar-name').innerText = currentUser.fullname;
        document.getElementById('avatar-text').innerText = currentUser.fullname.charAt(0).toUpperCase();
        
        alert('Cập nhật thông tin thành công!');
      });
    </script>
  </body>
</html>
