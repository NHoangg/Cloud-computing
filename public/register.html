<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoGear - Đăng ký</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
        padding: 2rem;
      }
      .auth-box {
        background: var(--bg-1);
        border: 1px solid var(--accent-soft);
        padding: 3rem;
        border-radius: 12px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .auth-box::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(61, 217, 255, 0.1) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }
      .auth-box > * {
        position: relative;
        z-index: 1;
      }
      .auth-box h2 {
        margin-top: 0;
        margin-bottom: 2rem;
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        color: var(--accent);
      }
      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }
      .form-group {
        text-align: left;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.9rem;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(0,0,0,0.3);
        color: var(--text);
        border-radius: 8px;
        font-family: inherit;
        transition: all 0.3s ease;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-soft);
        background: rgba(0,0,0,0.6);
      }
      .auth-btn {
        margin-top: 1rem;
        width: 100%;
        padding: 1rem;
        font-size: 1.1rem;
        border: none;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px var(--accent-soft);
      }
      .auth-links {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .auth-links a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }
      .auth-links a:hover {
        text-decoration: underline;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <header class="hero" style="min-height: auto; padding-bottom: 2rem;">
      <div class="hero__overlay"></div>
      <nav class="nav">
        <a href="/" class="logo" style="color: inherit; text-decoration: none;">NEOGEAR</a>
        <ul>
          <li><a href="/products.html">Sản phẩm</a></li>
          <li><a href="/#offers">Ưu đãi</a></li>
          <li><a href="/#about">Về chúng tôi</a></li>
          <li><a href="/cart.html">Giỏ hàng (<span id="cart-count">0</span>)</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <div class="auth-container">
        <div class="auth-box">
          <h2>Đăng Ký</h2>
          <form class="auth-form" id="registerForm">
            <div class="form-group">
              <label for="fullname">Họ và tên</label>
              <input type="text" id="fullname" name="fullname" placeholder="Nhập họ và tên" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required />
            </div>
            <div class="form-group">
              <label for="password">Mật khẩu</label>
              <input type="password" id="password" name="password" placeholder="Tạo mật khẩu" required />
            </div>
            <div class="form-group">
              <label for="confirm_password">Xác nhận mật khẩu</label>
              <input type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu" required />
            </div>
            <button type="submit" class="btn btn--primary auth-btn">Đăng Ký</button>
          </form>
          <div class="auth-links">
            Đã có tài khoản? <a href="/login.html">Đăng nhập</a>
          </div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
    <script>
      document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const fullname = document.getElementById('fullname').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;
        
        if (password !== confirm_password) {
            alert('Mật khẩu xác nhận không khớp!');
            return;
        }

        let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
        const userExists = users.some(u => u.email === email);
        if (userExists) {
            alert('Email này đã được đăng ký. Vui lòng đăng nhập!');
            window.location.href = '/login.html';
            return;
        }

        const newUser = { email: email, fullname: fullname, password: password };
        users.push(newUser);
        localStorage.setItem('registeredUsers', JSON.stringify(users));

        // Lưu thông tin người dùng vào localStorage
        const user = { email: email, fullname: fullname };
        localStorage.setItem('currentUser', JSON.stringify(user));
        
        alert('Đăng ký thành công! Bạn đã được tự động đăng nhập.');
        window.location.href = '/';
      });
    </script>
  </body>
</html>
